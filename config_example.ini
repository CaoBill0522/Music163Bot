# 以下为必填项
# 你的 Bot Token
BOT_TOKEN = YOUR_BOT_TOKEN

# 你的网易云 cookie 中 MUSIC_U 项的值（用于下载无损歌曲）
MUSIC_U = YOUR_MUSIC_U


# 以下为可选项
# 自定义 telegram bot API 地址
BotAPI = https://api.telegram.org

# 是否开启 bot 的 debug 功能
BotDebug = false

# 用户选择歌曲后的服务器下载路径 （默认为 /home/music）
DownloadPath = /home/music

# MP3 转换输出目录 （默认为 /home/music_mp3）
Mp3Path = /home/music_mp3

# 文件下载公网访问地址前缀，例如 https://example.com/download
# 建议用 nginx/caddy 将 FileRoot 映射为静态文件目录；/download 只通过这个配置生成直链
FileURLBase =

# 文件管理密码。留空时 /file 功能不可用
FilePassword =

# 文件管理根目录，默认为 /home。为安全起见，/file 只能访问这个目录以内的文件
FileRoot = /home

# VIP 实测歌曲关键词。/status 会静默下载该付费歌曲并检测是否只有约 30 秒，完成后自动删除临时文件
VipProbeKeyword = 徐良 飞机场

# 设置日志等级 [panic|fatal|error|warn|info|debug|trace] (默认为 info)
LogLevel = info

# 下载超时时长 (单位秒, 默认为 60)
DownloadTimeout = 60

# 自定义下载反向代理
ReverseProxy = 114.5.1.4:8080
